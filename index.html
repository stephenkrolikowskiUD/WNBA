<!DOCTYPE html>
<!-- Baseline: 2026-05-17 -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>WNBA DFS Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#fff;font-family:system-ui,-apple-system,sans-serif;max-width:480px;margin:0 auto;padding-bottom:60px}
select,input{background:#2a2a2a;color:#fff;border:1px solid #444;border-radius:8px;padding:8px 10px;font-size:14px;width:100%}
input::placeholder{color:#888}
.header{background:#1a1a1a;padding:12px 16px;border-bottom:1px solid #333;position:sticky;top:0;z-index:10}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.header-title{color:#eab308;font-weight:700;font-size:13px}
.refresh-btn{background:none;border:1px solid #444;border-radius:6px;color:#9ca3af;font-size:11px;padding:4px 10px;cursor:pointer}
.theme-btn{background:none;border:1px solid #444;border-radius:6px;color:#d1d5db;font-size:11px;padding:4px 10px;cursor:pointer}
.theme-btn:hover{background:#1f2937}
.player-link{color:inherit;text-decoration:underline dotted rgba(255,255,255,.35);cursor:pointer}
.player-link:hover{opacity:.85}
.risk-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;margin-left:6px}
.risk-returning{background:#f59e0b22;color:#fbbf24;border:1px solid #f59e0b44}
.risk-limited{background:#64748b22;color:#cbd5e1;border:1px solid #64748b44}
.risk-subnote{font-size:10px;color:#fbbf24;margin-top:4px;font-weight:600}
.muted-risk{opacity:.55}
.props-returning td{opacity:.6}
.locked-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;margin-left:6px;background:#47556922;color:#cbd5e1;border:1px solid #64748b55}
.locked-card{opacity:.5;filter:saturate(.7)}
.props-locked td{opacity:.45}
.section{padding:14px 16px 0}.label{color:#e5e7eb;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.card{background:#1a1a1a;border-radius:10px;padding:12px 14px}.card-title{color:#eab308;font-weight:700;font-size:13px;margin-bottom:8px}
.stats-strip{background:#1a1a1a;padding:10px 16px;border-bottom:1px solid #2a2a2a;overflow-x:auto}
.stats-strip-inner{display:flex;gap:16px;min-width:max-content}
.stat-item{text-align:center;min-width:40px}.stat-label{color:#d1d5db;font-size:9px;margin-bottom:2px;font-weight:600}.stat-val{color:#eab308;font-weight:700;font-size:13px}
.bar-chart{display:flex;align-items:flex-end;gap:3px;height:90px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center}
.bar-val{font-size:7px;color:#e5e7eb;margin-bottom:1px;font-weight:600}
.bar{width:100%;border-radius:3px 3px 0 0;transition:height .3s,background .3s}
.bar-date{font-size:7px;color:#d1d5db;margin-top:2px}
.line-indicator{border-top:1px dashed #eab308;margin-top:2px;padding-top:2px;font-size:9px;color:#eab308}
.avg-cards{display:flex;gap:8px}
.avg-card{flex:1;background:#1a1a1a;border-radius:8px;padding:10px 4px;text-align:center}
.avg-label{color:#d1d5db;font-size:9px;margin-bottom:4px}.avg-val{font-weight:700;font-size:15px}
.split-row{display:flex;gap:8px}
.split-card{flex:1;background:#1a1a1a;border-radius:10px;padding:12px}
.split-title{color:#e5e7eb;font-size:10px;font-weight:600;margin-bottom:8px;display:block}
.mini-bars-container{position:relative;height:70px;display:flex;gap:6px;align-items:flex-end}
.mini-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.mini-bar{width:100%;border-radius:3px 3px 0 0;flex-shrink:0}
.mini-bar-label{font-size:8px;color:#d1d5db;margin-top:2px}.mini-bar-val{font-size:8px;color:#fff;font-weight:600;margin-top:1px}
.vegas-row{display:flex;justify-content:space-between;margin-bottom:4px}
.vegas-key{color:#d1d5db;font-size:12px}.vegas-val{color:#fff;font-size:12px;font-weight:600}
.dk-line{font-size:16px;font-weight:800;color:#fff;margin-bottom:6px}
.dk-odds{display:flex;justify-content:space-between;margin-bottom:8px}
.hit-row{display:flex;justify-content:space-between;padding:4px 0;border-top:1px solid #333}
.hit-key{color:#d1d5db;font-size:12px}.hit-val{color:#fff;font-size:12px;font-weight:600}
.confidence{border-radius:10px;padding:14px;text-align:center}
.conf-label{font-size:20px;font-weight:800}.conf-edge{color:#d1d5db;font-size:11px;margin-top:4px}
.timestamp{text-align:center;padding:8px 16px;color:#9ca3af;font-size:10px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.error{padding:24px;color:#ef4444;font-size:14px}
.no-data{color:#9ca3af;font-size:11px}
body.light-theme{background:#f5f7fb;color:#111827}
body.light-theme .header,body.light-theme .stats-strip,body.light-theme .card,body.light-theme .avg-card,body.light-theme .split-card,body.light-theme .confidence,body.light-theme .tab-bar,body.light-theme th{background:#ffffff;color:#111827;border-color:#d6dbe6}
body.light-theme select,body.light-theme input{background:#ffffff;color:#111827;border-color:#cbd5e1}
body.light-theme input::placeholder{color:#94a3b8}
body.light-theme .header-title,body.light-theme .card-title,body.light-theme th,body.light-theme .tab-btn.active,body.light-theme .top-nav .tab-btn.active{color:#b45309}
body.light-theme .refresh-btn,body.light-theme .theme-btn,body.light-theme .sub-tab,body.light-theme .pf-btn{background:#ffffff;color:#475569;border-color:#cbd5e1}
body.light-theme td{color:#111827;border-color:#e5e7eb}
body.light-theme .tab-bar{border-top-color:#d6dbe6}
body.light-theme .bet-card,body.light-theme .ai-pick-card,body.light-theme .slip-card,body.light-theme .streak-card,body.light-theme .draft-card,body.light-theme .due-card{background:#ffffff;box-shadow:0 1px 2px rgba(15,23,42,.06)}
body.light-theme .props-returning td,body.light-theme .muted-risk{opacity:.6}
.early-banner{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:14px;margin:14px 16px 0;text-align:center}
.early-banner .icon{font-size:20px;margin-bottom:4px}
.early-banner .msg{color:#e5e7eb;font-size:12px;font-weight:600}
.early-banner .sub{color:#9ca3af;font-size:11px;margin-top:4px}
.tab-bar{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:#1a1a1a;border-top:1px solid #333;display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom)}
.tab-btn{flex:1;padding:12px;text-align:center;font-size:10px;font-weight:600;color:#9ca3af;cursor:pointer;border:none;background:none}
.tab-btn.active{color:#eab308;border-top:2px solid #eab308}
.page{display:none}.page.active{display:block}
.log-controls{padding:12px 16px}
.log-table-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 180px);padding:0 16px 80px}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:500px}
thead{position:sticky;top:0;z-index:5}
th{background:#1a1a1a;color:#eab308;font-weight:700;padding:8px 6px;text-align:center;border-bottom:1px solid #333;white-space:nowrap}
th.hl{background:#2a1f00}
td{padding:7px 6px;text-align:center;color:#fff;border-bottom:1px solid #222;white-space:nowrap}
td.hl{color:#eab308;font-weight:700}td.hit{color:#22c55e;font-weight:700}td.miss{color:#ef4444;font-weight:700}td.push{color:#9ca3af;font-weight:700}
tr.win td{background:#0f2a1a}tr.loss td{background:#2a0f0f}
.wl-w{color:#22c55e;font-weight:700}.wl-l{color:#ef4444;font-weight:700}
.sub-tabs{display:flex;gap:4px;padding:8px 16px;overflow-x:auto}
.sub-tab{padding:8px 14px;font-size:11px;font-weight:600;color:#9ca3af;background:#1a1a1a;border:1px solid #444;border-radius:20px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.sub-tab.active{color:#eab308;background:#eab30815;border-color:#eab308}
/* AI Picks */
.ai-pick-card{background:#1a1a1a;border-radius:10px;padding:12px 14px;margin:0 16px 8px;border-left:4px solid;cursor:pointer;transition:transform .15s,box-shadow .15s}
.ai-pick-card:active{opacity:.7;transform:scale(.98)}
.ai-rank{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:800;margin-right:8px}
.ai-pick-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ai-pick-player{font-weight:700;font-size:14px;display:flex;align-items:center}
.ai-pick-meta{display:flex;justify-content:space-between;font-size:11px;color:#9ca3af;margin-bottom:4px}
.ai-pick-rationale{font-size:11px;color:#d1d5db;font-style:italic}
.ai-conf-smash{border-left-color:#22c55e}.ai-conf-strong,.ai-conf-over{border-left-color:#eab308}.ai-conf-lean,.ai-conf-fade,.ai-conf-under{border-left-color:#ef4444}
.conf-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
.conf-tag-smash{background:#22c55e22;color:#22c55e}.conf-tag-strong,.conf-tag-over{background:#eab30822;color:#eab308}.conf-tag-lean,.conf-tag-fade,.conf-tag-under{background:#ef444422;color:#ef4444}
.picks-summary{display:flex;gap:8px;padding:0 16px 8px}
.ps-card{flex:1;background:#1a1a1a;border-radius:8px;padding:10px;text-align:center}
.ps-val{font-size:18px;font-weight:800;color:#eab308}.ps-lbl{font-size:9px;color:#d1d5db;margin-top:2px}
/* +EV */
.ev-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:4px}
.ev-pos{background:#22c55e22;color:#22c55e;border:1px solid #22c55e44}
.ev-neg{background:#ef444422;color:#ef4444;border:1px solid #ef444444}
.ev-neutral{background:#eab30822;color:#eab308;border:1px solid #eab30844}
.ev-big{font-size:10px;padding:3px 8px}
.bet-card{background:#1a1a1a;border-radius:10px;padding:12px 14px;margin:0 16px 8px;border-left:3px solid #22c55e;display:flex;align-items:center;justify-content:space-between;transition:transform .15s,box-shadow .15s}
.bet-card.elite{border-left-color:#ef4444;background:#1a1418}.bet-card.strong{border-left-color:#eab308}.bet-card.mid{border-left-color:#9ca3af}
.bet-left{flex:1}.bet-name{font-weight:700;font-size:14px}.bet-meta{color:#d1d5db;font-size:11px;margin-top:2px}
.bet-prop{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.bet-right{text-align:right;min-width:70px}.bet-edge{font-size:20px;font-weight:800}.bet-edge.pos{color:#22c55e}
.bet-sub{font-size:9px;color:#9ca3af;margin-top:1px}
.bet-bar{height:4px;border-radius:2px;margin-top:6px;background:#2a2a2a;overflow:hidden}.bet-bar-fill{height:100%;border-radius:2px}
.bet-summary{display:flex;gap:8px;padding:0 16px 8px}
.bs-card{flex:1;background:#1a1a1a;border-radius:8px;padding:10px;text-align:center}
.bs-val{font-size:18px;font-weight:800;color:#22c55e}.bs-lbl{font-size:9px;color:#d1d5db;margin-top:2px}
.convergence-shell{padding:12px 16px 4px}
.convergence-toggle{list-style:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 12px;border:1px solid #2a2a2a;border-radius:12px;background:#141414}
.convergence-toggle::-webkit-details-marker{display:none}
.convergence-title{display:flex;flex-direction:column;gap:2px}
.convergence-kpis{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.convergence-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 9px;border-radius:999px;background:#1f2937;color:#d1d5db;font-size:10px;font-weight:700}
.convergence-chip strong{font-size:11px}
.convergence-body{padding-top:10px}
.prop-metric-tag{background:#2a2a2a;border:1px solid #444;border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;color:#eab308}
/* Smart Slips */
.slip-card{background:#1a1a1a;border-radius:10px;padding:14px;margin:0 16px 10px;border-left:3px solid #eab308;transition:transform .15s,box-shadow .15s}
.slip-card.best{border-left-color:#22c55e;background:#111a14}.slip-card.aggressive{border-left-color:#f59726}
.slip-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.slip-rank{font-size:11px;font-weight:700;color:#eab308;background:#2a2a2a;padding:2px 8px;border-radius:4px}
.slip-score{font-size:13px;font-weight:800;color:#eab308}
.slip-legs{display:flex;flex-direction:column;gap:6px}
.slip-leg{display:flex;align-items:center;gap:8px;padding:6px 8px;background:#2a2a2a;border-radius:6px}
.slip-leg-name{font-weight:600;font-size:12px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slip-leg-prop{display:flex;align-items:center;gap:6px;flex-shrink:0}
.slip-leg-metric{font-size:10px;font-weight:700;color:#eab308;background:#111;padding:2px 5px;border-radius:3px}
.slip-leg-lean{font-size:11px;font-weight:700}
.slip-leg-lean.over{color:#22c55e}.slip-leg-lean.under{color:#ef4444}
.slip-leg-edge{font-size:9px;font-weight:600;color:#d1d5db}
.slip-leg-team{font-size:9px;color:#9ca3af;min-width:28px;text-align:center}
.slip-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.slip-tag{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;background:#2a2a2a;color:#d1d5db;border:1px solid #444}
.slip-meta{color:#9ca3af;font-size:10px;margin-top:6px;display:flex;justify-content:space-between}
.slip-controls{display:flex;gap:8px;padding:8px 16px;align-items:center;flex-wrap:wrap}
.slip-controls .pf-btn{font-size:11px}
/* They're Due */
.due-card{background:#1a1a1a;border-radius:10px;padding:12px 14px;margin:0 16px 8px;border-left:3px solid #38bdf8;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:transform .15s,box-shadow .15s}
.due-card.top{border-left-color:#818cf8;background:#14141a}
.due-left{flex:1}.due-name{font-weight:700;font-size:14px}
.due-label{font-size:10px;font-weight:600;color:#38bdf8;margin-left:6px}
.due-meta{color:#d1d5db;font-size:11px;margin-top:2px}
.due-right{text-align:right;min-width:65px}
.due-score{font-size:20px;font-weight:800;color:#38bdf8}.due-card.top .due-score{color:#818cf8}
.due-sub{font-size:9px;color:#9ca3af;margin-top:1px}
.due-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.due-tag{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px}
.due-tag.cold{background:#1a1a2a;color:#93c5fd;border:1px solid #2d2d5a}
.due-tag.matchup{background:#1a2a1a;color:#86efac;border:1px solid #2d5a2d}
.due-tag.prop{background:#2a2a1a;color:#fde68a;border:1px solid #5a5a2d}
.due-chart{display:flex;gap:2px;align-items:flex-end;height:28px;margin-top:6px}
.due-chart-bar{width:8px;border-radius:2px 2px 0 0;min-height:3px}
.due-filters{display:flex;gap:6px;padding:8px 16px;overflow-x:auto}
/* Streaks */
.streak-card{background:#1a1a1a;border-radius:10px;padding:12px 14px;margin:0 16px 8px;border-left:3px solid #444;position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s}
.streak-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0}
.streak-card.inferno{border-left-color:#ef4444}.streak-card.inferno::before{background:linear-gradient(90deg,transparent,rgba(239,68,68,.5),transparent);opacity:1}
.streak-card.fire{border-left-color:#ff6b35}.streak-card.fire::before{background:linear-gradient(90deg,transparent,rgba(255,107,53,.4),transparent);opacity:1}
.streak-card.hot{border-left-color:#eab308}.streak-card.hot::before{background:linear-gradient(90deg,transparent,rgba(234,179,8,.3),transparent);opacity:1}
.streak-card.warm{border-left-color:#ffd966}
.streak-top{display:flex;justify-content:space-between;align-items:flex-start}
.streak-player{font-weight:700;font-size:14px}.streak-heat{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle}
.streak-count{font-size:26px;font-weight:800;line-height:1;text-align:right}
.streak-count-label{font-size:8px;color:#9ca3af;text-transform:uppercase;letter-spacing:1px;text-align:right;font-weight:700;margin-top:1px}
.streak-info{color:#d1d5db;font-size:11px;margin-top:4px}
.streak-stats{display:flex;gap:8px;padding:8px 10px;background:rgba(0,0,0,.3);border-radius:8px;margin-top:8px;align-items:center;border:1px solid rgba(255,255,255,.03)}
.streak-stat{flex:1;text-align:center}.streak-stat-label{font-size:8px;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.streak-stat-val{font-size:13px;font-weight:700;margin-top:1px}.streak-stat-divider{border-left:1px solid rgba(255,255,255,.06);height:24px}
.streak-chart{display:flex;align-items:flex-end;gap:2px;height:28px}.streak-chart-bar{border-radius:2px 2px 0 0;min-width:6px;flex:1}
.streak-action{margin-top:8px}.streak-dash-btn{width:100%;padding:7px 0;border-radius:6px;border:1px solid #444;background:#1a1a1a;color:#d1d5db;font-size:11px;font-weight:600;cursor:pointer;text-align:center}
.streak-filters{display:flex;gap:6px;padding:0 16px 10px;overflow-x:auto}
.sf-btn{padding:5px 10px;font-size:10px;font-weight:700;color:#9ca3af;background:#1a1a1a;border:1px solid #444;border-radius:14px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.sf-btn.active{color:#eab308;background:#eab30815;border-color:rgba(234,179,8,.4)}
/* Draft */
.draft-card{background:#1a1a1a;border-radius:10px;padding:10px 14px;margin:0 16px 6px;border-left:3px solid #444;display:flex;align-items:center;gap:10px;cursor:pointer;transition:transform .15s,box-shadow .15s,opacity .15s}
.draft-card:active{transform:scale(.98)}.draft-card.drafted{opacity:.3;text-decoration:line-through}
.draft-card.smash{border-left-color:#22c55e}.draft-card.tier1{border-left-color:#eab308}.draft-card.tier2{border-left-color:#3b82f6}.draft-card.tier3{border-left-color:#8b5cf6}
.draft-rank{font-size:14px;font-weight:800;min-width:24px;text-align:center}
.draft-main{flex:1;min-width:0}.draft-name{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.draft-meta{font-size:10px;color:#9ca3af;margin-top:2px}.draft-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.draft-tag{font-size:8px;font-weight:700;padding:1px 5px;border-radius:4px}
.draft-fp{text-align:right;min-width:50px}.draft-fp-val{font-size:18px;font-weight:800}.draft-fp-lbl{font-size:8px;color:#9ca3af}
.draft-tier-label{padding:8px 16px 4px;font-size:11px;font-weight:700;letter-spacing:1px}
.draft-controls{display:flex;gap:6px;padding:8px 16px;align-items:center}
.draft-reset{background:none;border:1px solid #444;border-radius:6px;color:#9ca3af;font-size:10px;padding:4px 10px;cursor:pointer}
.draft-count{font-size:10px;color:#9ca3af;flex:1;text-align:right}
/* Props */
.props-filter{display:flex;gap:6px;padding:8px 16px;overflow-x:auto}
.pf-btn{padding:6px 12px;font-size:11px;font-weight:600;color:#9ca3af;background:#1a1a1a;border:1px solid #444;border-radius:16px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.pf-btn.active{color:#eab308;background:#eab30815;border-color:#eab308}
.props-tbl-wrap{overflow-x:auto;overflow-y:auto;max-height:50vh;padding:0 16px 16px}
.props-tbl-wrap table{min-width:420px}
.odds-over{color:#22c55e;font-weight:600}.odds-under{color:#ef4444;font-weight:600}.odds-even{color:#f59726;font-weight:600}
/* Desktop */
.top-nav{display:none}.header-controls{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.cards-wrap{padding:0}.cards-grid{}.dash-grid{}.dash-bottom{padding:0 16px}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333;border-radius:4px}

const SHEET_ID="1mv_4oNUP8nX418sUulo-Ect3qSQLL1zGzW3r0QEMD6g";

let st={tonight:[],playerStats:[],props:[],splits:[],aiPicks:[],correlations:[],player:"",metric:"PTS",line:"",activeTab:"dashboard",oppFilter:"",pickPerformance:[],pickPerformanceSnaps:[],statsTimeWindow:"last_30d",gameEntry:{selectedGame:null,legCount:GAME_ENTRY_DEFAULT_LEGS,entry:null},picksView:"bets",propsMetric:"ALL",propsSearch:"",streakFilter:"all",dueFilter:"all",streaks:[],drafted:new Set(),slipLegs:"3",parlayStat:"PTS",loading:true,error:null,loadedAt:null,latestPickDate:"",pickGuard:null,dataVersion:0,theme:(localStorage.getItem("nba-dashboard-theme")||"dark")};

function indexRowsByName(rows,nameKey){
  const map=new Map();
  for(const row of rows||[]){
    const key=normalizePlayerName(row?.[nameKey]);
    if(!key)continue;
    if(!map.has(key))map.set(key,[]);
    map.get(key).push(row);
  }

}
function ensureDerived(){
  if(derived.version===st.dataVersion)return;

  derived.propsByName=indexRowsByName(st.props,"PLAYER_NAME");
  for(const row of st.tonight||[]){
    const key=normalizePlayerName(row?.PLAYER_NAME);
    if(key&&!derived.tonightByName.has(key))derived.tonightByName.set(key,row);
  }

const toNum=v=>parseFloat(v)||0;

const esc=s=>String(s||"").replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
function impliedProb(odds){if(!odds&&odds!==0)return null;const o=parseInt(odds);if(isNaN(o))return null;return o<0?Math.abs(o)/(Math.abs(o)+100):100/(o+100)}
function cleanName(v){return String(v||"").trim()}
function normalizeDate(val){
  const s=String(val||"").trim();
  if(!s)return"";
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  if(/^\d{4}\/\d{2}\/\d{2}$/.test(s))return s.replace(/\//g,"-");
  const mdy=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(mdy){
    const [,m,d,y]=mdy;
    return `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  }
  const parsed=new Date(s);
  if(!Number.isNaN(parsed.getTime())){
    const y=parsed.getFullYear();
    const m=String(parsed.getMonth()+1).padStart(2,"0");
    const d=String(parsed.getDate()).padStart(2,"0");
    return `${y}-${m}-${d}`;
  }
  return s;
}
function fmtNowEastern(){
  return new Date().toLocaleString("en-US",{timeZone:"America/New_York",month:"2-digit",day:"2-digit",year:"numeric",hour:"numeric",minute:"2-digit",hour12:true}).replace(",","") + " EST";
}
function parseStartMs(v){
  if(!v)return null;

// ═══ DATA CLEANING (ported from MLB) ═══
function cleanRows(rows){
  if(!rows||!rows.length)return rows;
  return rows.map(row=>{
    const clean={};
    for(const[k,v]of Object.entries(row)){
      const ck=k.replace(/^\uFEFF/,'').replace(/[\u200B-\u200D\uFEFF]/g,'').trim();
      clean[ck]=v;
    }
    return clean;
  });
}
function normalizeKeys(rows){
  if(!rows||!rows.length)return rows;
  return rows.map(row=>{
    const clean={};
    for(const[k,v]of Object.entries(row)){
      const trimmed=String(k||'')
        .replace(/^\uFEFF/,'')
        .replace(/[\u200B-\u200D\uFEFF]/g,'')
        .trim();
      clean[trimmed]=v;
    }
    return clean;
  });
}

// ═══ FOCUS PRESERVATION (ported from MLB) ═══
let _restoring=false;
function saveFocus(){const el=document.activeElement;if(el&&el.id)return{id:el.id,pos:el.selectionStart,val:el.value};return null}
function restoreFocus(f){if(!f)return;const el=document.getElementById(f.id);if(el){_restoring=true;el.focus();if(f.val!==undefined)el.value=f.val;if(el.setSelectionRange&&f.pos!==undefined)try{el.setSelectionRange(f.pos,f.pos)}catch(e){}_restoring=false}}

// ═══ ROBUST PLAYER FINDER (ported from MLB) ═══
function firstValidPlayer(arr){
  if(!arr||!arr.length)return "";
  for(let i=0;i<Math.min(arr.length,30);i++){
    const row=arr[i];if(!row)continue;
    const n=cleanName(row.PLAYER_NAME);
    if(n&&String(n).trim().length>1)return String(n).trim();
  }
  const first=arr[0];if(!first)return "";
  const key=Object.keys(first).find(k=>k.replace(/[^a-zA-Z_]/g,'').toLowerCase()==="player_name"||k.includes("PLAYER_NAME"));
  if(key){
    for(let i=0;i<Math.min(arr.length,30);i++){
      const v=cleanName(arr[i]?.[key]);
      if(v&&String(v).trim().length>1)return String(v).trim();
    }
  }
  console.warn("⚠️ Could not find PLAYER_NAME. Keys:",Object.keys(first).slice(0,5));
  return "";
}
function normalizePlayerName(name){
  return cleanName(name)
    .toLowerCase()
    .replace(/['’`.]/g,"")
    .replace(/\b(jr|sr|ii|iii|iv)\b/g,"")
    .replace(/[^a-z0-9]+/g," ")
    .trim();
}
function normalizePropName(prop){
  return cleanName(prop).toUpperCase().replace(/\s+/g,"");
}
function normalizeLeanText(lean){
  const v=cleanName(lean).toUpperCase();
  if(v==="FADE")return"UNDER";
  return v;
}
function normalizeConfidence(conf){
  const v=cleanName(conf).toUpperCase();
  return v==="SMASH"||v==="STRONG"||v==="LEAN"?v:"LEAN";
}
function aiAgreesWithBet(aiPick,betLikeObject){
  if(!aiPick||!betLikeObject)return false;
  return normalizePlayerName(aiPick.player||aiPick.PLAYER||aiPick.Player||aiPick.PLAYER_NAME)===normalizePlayerName(betLikeObject.name||betLikeObject.player)
    && normalizePropName(aiPick.prop_type||aiPick.stat||aiPick.metric)===normalizePropName(betLikeObject.metric||betLikeObject.prop_type||betLikeObject.stat)
    && normalizeLeanText(aiPick.lean)===normalizeLeanText(betLikeObject.lean);
}
function easternTodayISO(){

}

    return st.props.length
      ?{level:"warn",text:"Engine issue — AI picks are missing or incomplete for tonight's slate."}

const fetchSheet=n=>new Promise((res,rej)=>{
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&headers=1&sheet=${encodeURIComponent(n)}&cacheBust=${Date.now()}`;

  ensureDerived();

  if(cache.player===target&&cache.sortedLogs)return cache.sortedLogs;

// ═══ +EV ENGINE ═══
function getHitRate(name,metric,line){
  const logs=getPlayerLogs(name);if(logs.length<3)return null;
  const ln=parseFloat(line);if(isNaN(ln))return null;
  let over=0,under=0,push=0;
  for(const g of logs){
    const val=COMBO_STATS[metric]
      ?COMBO_STATS[metric].reduce((s,k)=>s+toNum(g[k]),0)
      :toNum(g[metric]);
    if(val>ln)over++;
    else if(val<ln)under++;
    else push++;
  }
  const nonPush=over+under;
  return{
    overRate:nonPush?over/nonPush:0,
    underRate:nonPush?under/nonPush:0,
    pushRate:logs.length?push/logs.length:0,
    over,under,push,nonPush,total:logs.length
  };
}
function getBestBets(){
  return getMemo("bestBets",()=>{if(!st.props.length||!st.playerStats.length)return[];const bets=[];const tSet=new Set(st.tonight.map(p=>normalizePlayerName(p.PLAYER_NAME)).filter(Boolean));
  for(const p of st.props){const name=cleanName(p.PLAYER_NAME),nameKey=normalizePlayerName(p.PLAYER_NAME);if(!name||!nameKey||!tSet.has(nameKey))continue;const metric=p.METRIC;const line=parseFloat(p.DK_LINE);if(isNaN(line))continue;
    const MIN_LINES={STL:1.5,BLK:1.5,AST:2.5,TOV:1.5};if(MIN_LINES[metric]&&line<MIN_LINES[metric])continue;

    const oIP=impliedProb(overO),uIP=impliedProb(underO);let oE=null,uE=null;if(oIP!==null)oE=hr.overRate-oIP;if(uIP!==null)uE=hr.underRate-uIP;
    let lean,edge,odds,ip,hitRate;
    if(oE!==null&&uE!==null){if(oE>=uE){lean="OVER";edge=oE;odds=overO;ip=oIP;hitRate=hr.overRate}else{lean="UNDER";edge=uE;odds=underO;ip=uIP;hitRate=hr.underRate}}
    else if(oE!==null){lean="OVER";edge=oE;odds=overO;ip=oIP;hitRate=hr.overRate}else{lean="UNDER";edge=uE;odds=underO;ip=uIP;hitRate=hr.underRate}
    if(edge===null)continue;const pT=derived.tonightByName.get(nameKey)||{};const flags=getSampleFlags(name);const spread=Math.abs(toNum(pT.SPREAD));const gameTotal=toNum(pT.GAME_TOTAL);const gameKey=[pT.TEAM_ABBREVIATION||"",pT.TONIGHT_OPP||""].sort().join("|");
    bets.push({name,metric,line,lean,edge,odds,impliedProb:ip,hitRate,hits:lean==="OVER"?hr.over:hr.under,total:hr.nonPush,team:pT.TEAM_ABBREVIATION||"",opp:pT.TONIGHT_OPP||"",dkLine:p.DK_LINE,overOdds:p.OVER_ODDS,underOdds:p.UNDER_ODDS,returning:flags.returning,limitedSample:flags.limited,spread,gameTotal,gameKey,blowoutRisk:spread>10});
  }bets.sort((a,b)=>(a.returning===b.returning?b.edge-a.edge:(a.returning?1:-1)));return bets;});
}

// ═══ SMART SLIPS ═══
function getConvictionLegs(){
  const SLIP_WORTHY=new Set(["PTS","REB","AST","PRA","PR","PA","RA","FG3M","UD_FP","STOCKS"]);
  const bets=getBestBets().filter(b=>b.edge>0&&!b.returning&&!getLockInfo(b.name).started).filter(b=>{
    // Filter out junk props: low lines on peripheral stats
    if(!SLIP_WORTHY.has(b.metric))return false;
    // No "under 0.5" or "under 1.5" on non-counting stats — not real picks
    if(b.lean==="UNDER"&&parseFloat(b.dkLine)<=1.5&&["STOCKS","FG3M"].includes(b.metric))return false;
    // Minimum line thresholds for meaningful parlays
    if(b.metric==="PTS"&&parseFloat(b.dkLine)<5)return false;
    if(b.metric==="PRA"&&parseFloat(b.dkLine)<10)return false;

  });if(!bets.length)return[];
  const aiMap=new Map();st.aiPicks.forEach(pk=>{const key=normalizePlayerName(pk.player||pk.PLAYER||pk.Player||pk.PLAYER_NAME);if(key)aiMap.set(key,pk)});
  const streakMap=new Map();try{st.streaks.forEach(s=>{streakMap.set(`${normalizePlayerName(s.player)}|${normalizePropName(s.stat)}`,s)})}catch(e){}
  const legs=[];
  for(const b of bets){
    const evScore=Math.min(b.edge*40,10);let aiScore=0;
    const ai=aiMap.get(normalizePlayerName(b.name));let aiAgrees=false;
    let aiConflictLevel="",aiDisagreementText="";
    if(ai){
      const c=normalizeConfidence(ai.confidence);
      const aiLean=normalizeLeanText(ai.lean);
      const samePropType=normalizePropName(ai.prop_type)===normalizePropName(b.metric);
      if(samePropType && aiLean && aiLean!==b.lean){
        aiConflictLevel="strong";
        aiDisagreementText=`AI says ${aiLean} ${ai.prop_type||b.metric}`;
        aiScore-=c==="SMASH"?3:c==="STRONG"?2:1;
      }else if(aiLean && aiLean!==b.lean){
        aiConflictLevel="soft";
        aiDisagreementText=`AI leans ${aiLean} ${ai.prop_type||""}`.trim();
        aiScore-=c==="SMASH"?1.5:0.75;
      }else if(aiAgreesWithBet(ai,b)){aiAgrees=true;aiScore=c==="SMASH"?6:4}
      else{aiScore=c==="SMASH"?1.5:0.5}
    }
    let streakScore=0;const sk=streakMap.get(`${normalizePlayerName(b.name)}|${normalizePropName(b.metric)}`);if(sk){streakScore=sk.streak>=7?3:sk.streak>=5?2:1}
    const reliScore=Math.min(b.total/10,2),hrScore=b.hitRate>=0.8?2:b.hitRate>=0.65?1:0;
    let conviction=evScore+aiScore+streakScore+reliScore+hrScore;
    if(b.blowoutRisk)conviction*=0.7;
    let signals=[];if(aiAgrees){const c=normalizeConfidence(ai.confidence);signals.push(c==="SMASH"?"🤖 SMASH":"🤖 AI")}
    if(aiConflictLevel==="strong")signals.push("⚠️ AI conflict");
    else if(aiConflictLevel==="soft")signals.push("⚠️ AI cross-check");
    if(sk)signals.push(`🔥 ${sk.streak}G`);if(b.edge>=0.15)signals.push("💎 Elite");else if(b.edge>=0.08)signals.push("📈 Strong");
    if(b.hitRate>=0.8)signals.push(`✅ ${(b.hitRate*100).toFixed(0)}%`);
    if(b.blowoutRisk)signals.push("⚠️ BLOWOUT RISK");
    legs.push({...b,conviction,signals,hasAI:aiAgrees,hasAIConflict:!!aiConflictLevel,aiConflictLevel,aiDisagreementText,hasStreak:!!sk});
  }legs.sort((a,b)=>b.conviction-a.conviction);return legs;
}
function generateSlips(legs,n){
  if(legs.length<n)return[];const slips=[];const maxIter=n<=3?500:300;
  function gen(s,cur,used,tc){if(cur.length===n){let sc=cur.reduce((s,l)=>s+l.conviction,0);const slipTags=[];for(let i=0;i<cur.length;i++){for(let j=i+1;j<cur.length;j++){const a=cur[i],b=cur[j];const corr=getCorrValue(a.name,b.name);if(a.team===b.team&&corr>0.3){sc*=1.15;slipTags.push("🔗 CORRELATED")}}}slips.push({legs:cur.slice(),score:sc,avgEdge:cur.reduce((s,l)=>s+l.edge,0)/n,avgHitRate:cur.reduce((s,l)=>s+l.hitRate,0)/n,teams:[...new Set(cur.map(l=>l.team))],signalCount:cur.reduce((s,l)=>s+l.signals.length,0),slipTags:[...new Set(slipTags)]});return}
    for(let i=s;i<pool.length&&slips.length<maxIter;i++){const l=pool[i];if(used.has(l.name))continue;const t=tc.get(l.team)||0;if(t>=2)continue;used.add(l.name);tc.set(l.team,t+1);cur.push(l);gen(i+1,cur,used,tc);cur.pop();used.delete(l.name);tc.set(l.team,t)}}
  const seen=new Set();const dedupedLegs=legs.filter(l=>{const k=normalizePlayerName(l.name);if(seen.has(k))return false;seen.add(k);return true;});const pool=dedupedLegs.slice(0,n<=3?15:n<=4?18:20);
  gen(0,[],new Set(),new Map());slips.sort((a,b)=>b.score-a.score);
  const MAX_SLIPS=8;let selected=[];
  for(let cap=2;cap<=MAX_SLIPS;cap++){
    selected=[];const playerUsageCount=new Map();
    for(const slip of slips){
      if(selected.length>=MAX_SLIPS)break;
      const overUsed=slip.legs.some(l=>(playerUsageCount.get(normalizePlayerName(l.name))||0)>=cap);
      if(overUsed)continue;
      selected.push(slip);
      slip.legs.forEach(l=>{const n=normalizePlayerName(l.name);playerUsageCount.set(n,(playerUsageCount.get(n)||0)+1);});
    }
    if(selected.length>=MAX_SLIPS)break;
  }
  return selected.slice(0,MAX_SLIPS);
}
function getSmartSlips(){return getMemo("smartSlips",()=>{const legs=getConvictionLegs();return{legs,slips3:generateSlips(legs,3),slips4:generateSlips(legs,4),slips5:generateSlips(legs,5)}})}

function getDueBoard(){
  return getMemo("dueBoard",()=>{const due=[];const tNames=[...new Set(st.tonight.map(p=>cleanName(p.PLAYER_NAME)).filter(Boolean))];
  const stats=["PTS","REB","AST","PRA","FG3M","UD_FP"];
  for(const name of tNames){const logs=getPlayerLogs(name);if(logs.length<7)continue;const nameKey=normalizePlayerName(name);const pT=derived.tonightByName.get(nameKey)||{};const most=logs[0]||{};
    for(const stat of stats){
      const seasAvg=COMBO_STATS[stat]?getRollingVal(most,"Seas_",stat):toNum(most[`Seas_${stat}`]);
      const l5Avg=COMBO_STATS[stat]?getRollingVal(most,"L5_",stat):toNum(most[`L5_${stat}`]);
      if(seasAvg<=0)continue;
      const coldGap=(seasAvg-l5Avg)/seasAvg;if(coldGap<0.20)continue;
      let drought=0;for(const g of logs){if(getMetricVal(g,stat)<seasAvg)drought++;else break}if(drought<2)continue;
      let matchupScore=0,matchupTags=[];
      const oppDef=toNum(pT.OPP_DEF_RTG);if(oppDef>=112){matchupScore+=3;matchupTags.push(`Weak D (${oppDef.toFixed(1)})`)}else if(oppDef>=110){matchupScore+=1.5;matchupTags.push(`Avg D (${oppDef.toFixed(1)})`)}
      const oppPace=toNum(pT.OPP_PACE);if(oppPace>=100){matchupScore+=2;matchupTags.push(`Fast (${oppPace.toFixed(1)})`)}else if(oppPace>=98){matchupScore+=1;matchupTags.push(`Avg pace`)}
      const gt=toNum(pT.GAME_TOTAL);if(gt>=230){matchupScore+=2;matchupTags.push(`High O/U: ${gt}`)}
      if(stat==="FG3M"){
        if(drought>=3){matchupScore+=2.5;matchupTags.push(`3PM drought (${drought}g)`)}
        if(oppPace>=99){matchupScore+=1.5;matchupTags.push(`Extra pace for 3PA`)}
      }else if(stat==="AST"){
        if(drought>=3){matchupScore+=2;matchupTags.push(`Assist regression spot`)}
        if(gt>=228){matchupScore+=1.5;matchupTags.push(`High-total assist environment`)}
      }else if(stat==="PRA"){
        if(coldGap>=0.25){matchupScore+=2;matchupTags.push(`PRA underperformance`)}
        if(gt>=228&&oppPace>=98){matchupScore+=1.5;matchupTags.push(`Full stat environment`)}
      }
      const prop=st.props.find(pr=>normalizePlayerName(pr.PLAYER_NAME)===nameKey&&normalizePropName(pr.METRIC)===normalizePropName(stat));let propTag=null;
      if(prop)propTag={line:prop.DK_LINE,overOdds:parseInt(prop.OVER_ODDS)||null};
      const totalScore=coldGap*15+Math.min(drought*1.5,10)+matchupScore;if(totalScore<5)continue;
      const recentVals=logs.slice(0,7).map(g=>getMetricVal(g,stat));
      due.push({name,team:pT.TEAM_ABBREVIATION||"",opp:pT.TONIGHT_OPP||"",stat,seasAvg:seasAvg.toFixed(1),l5Avg:l5Avg.toFixed(1),coldGap:(coldGap*100).toFixed(0),drought,matchupScore,matchupTags,propTag,recentVals,totalScore});
  }}
  const best={};for(const d of due){if(!best[d.name]||d.totalScore>best[d.name].totalScore)best[d.name]=d}
  const result=Object.values(best);result.sort((a,b)=>b.totalScore-a.totalScore);return result;});
}

function getStatParlayBoard(stat){
  return getMemo(`statParlay:${stat}`,()=>{const rows=[];const tSet=new Set(st.tonight.map(p=>normalizePlayerName(p.PLAYER_NAME)).filter(Boolean));
  for(const p of st.props){
    const name=p.PLAYER_NAME,nameKey=normalizePlayerName(p.PLAYER_NAME);if(!name||!nameKey||!tSet.has(nameKey))continue;
    if(normalizePropName(p.METRIC)!==normalizePropName(stat))continue;
    const dkLine=parseFloat(p.DK_LINE);if(isNaN(dkLine))continue;
    const overOdds=parseInt(p.OVER_ODDS),underOdds=parseInt(p.UNDER_ODDS);
    const logs=getPlayerLogs(name);if(logs.length<3)continue;const most=logs[0]||{};
    const hitsOver=COMBO_STATS[stat]
      ?logs.filter(g=>COMBO_STATS[stat].reduce((s,k)=>s+toNum(g[k]),0)>dkLine).length
      :logs.filter(g=>toNum(g[stat])>dkLine).length;
    const hitRate=hitsOver/logs.length;
    const overIP=impliedProb(overOdds);
    const edge=overIP!==null?hitRate-overIP:0;
    const seasAvg=getRollingVal(most,"Seas_",stat);
    const l5Avg=getRollingVal(most,"L5_",stat);
    const pT=derived.tonightByName.get(nameKey)||{};
    let matchupScore=0;
    const oppDef=toNum(pT.OPP_DEF_RTG);if(oppDef>=112)matchupScore+=2;else if(oppDef>=110)matchupScore+=1;
    const oppPace=toNum(pT.OPP_PACE);if(oppPace>=100)matchupScore+=2;else if(oppPace>=98)matchupScore+=1;
    const gt=toNum(pT.GAME_TOTAL);if(gt>=230)matchupScore+=2;
    const score=hitRate*40+Math.max(edge,0)*30+matchupScore*3+(l5Avg>seasAvg?5:0);
    rows.push({name,team:pT.TEAM_ABBREVIATION||"",opp:pT.TONIGHT_OPP||"",stat,dkLine,overOdds,underOdds,hitRate,hitsOver,total:logs.length,edge,seasAvg,l5Avg,matchupScore,score});
  }
  rows.sort((a,b)=>b.score-a.score);return rows;});
}
function getStatParlayCombos(board,legs){
  if(board.length<legs)return[];const combos=[];const pool=board.slice(0,legs<=2?12:15);
  function gen(start,current){
    if(current.length===legs){const teams=current.map(d=>d.team);const teamCounts={};for(const t of teams){teamCounts[t]=(teamCounts[t]||0)+1;if(teamCounts[t]>2)return}
      const score=current.reduce((s,d)=>s+d.score,0);const avgHitRate=current.reduce((s,d)=>s+d.hitRate,0)/legs;const avgEdge=current.reduce((s,d)=>s+d.edge,0)/legs;
      combos.push({players:current.slice(),score,avgHitRate,avgEdge,teams:[...new Set(teams)]});return}
    for(let i=start;i<pool.length&&combos.length<300;i++){if(current.some(c=>c.name===pool[i].name))continue;current.push(pool[i]);gen(i+1,current);current.pop()}}
  gen(0,[]);combos.sort((a,b)=>b.score-a.score);return combos.slice(0,8);
}

function getConvergenceBoard(){
  return getMemo("convergenceBoard",()=>{if(!st.aiPicks.length)return[];
  const board=new Map();
  const allowed=new Set(st.aiPicks.map(p=>normalizePlayerName(p.player||p.PLAYER||p.Player||p.PLAYER_NAME)).filter(Boolean));
  const bestBetMap=new Map();
  const add=(name,source,boost=0,meta={})=>{
    if(!name)return;
    const key=normalizePlayerName(name);
    if(allowed.size && !allowed.has(key))return;
    if(!board.has(key))board.set(key,{name,sources:new Set(),score:0,team:meta.team||"",opp:meta.opp||"",detail:""});
    const row=board.get(key);
    row.sources.add(source);
    row.score+=boost;
    if(!row.team&&meta.team)row.team=meta.team;
    if(!row.opp&&meta.opp)row.opp=meta.opp;
    if(!row.detail&&meta.detail)row.detail=meta.detail;
  };
  getBestBets().filter(b=>b.edge>0).slice(0,20).forEach(b=>{
    const key=normalizePlayerName(b.name);
    if(!bestBetMap.has(key))bestBetMap.set(key,b);
    add(b.name,"Best Bets",2+Math.min(b.edge*20,3),{team:b.team,opp:b.opp,detail:`${b.lean} ${b.metric} ${b.dkLine}`});
  });
  st.aiPicks.forEach(pk=>{
    const key=normalizePlayerName(pk.player||pk.PLAYER||pk.Player||pk.PLAYER_NAME);
    const bestBet=bestBetMap.get(key);
    if(!bestBet || !aiAgreesWithBet(pk,bestBet))return;
    const conf=normalizeConfidence(pk.confidence);
    add(pk.player||pk.PLAYER||pk.Player||pk.PLAYER_NAME,"AI",conf==="SMASH"?4:conf==="STRONG"?3:2,{detail:`${pk.lean||""} ${pk.prop_type||""} ${pk.line||""}`.trim()});
  });
  getStreaks().slice(0,20).forEach(s=>add(s.player,"Streaks",s.streak>=7?3:s.streak>=5?2.5:2,{team:s.team,opp:s.opp,detail:`${s.streak}G ${s.stat}`}));
  getDueBoard().slice(0,20).forEach(d=>add(d.name,"Due",1.5+Math.min((d.totalScore||0)/12,2),{team:d.team,opp:d.opp,detail:`Due ${d.stat}`}));
  getHeaters().slice(0,15).forEach(h=>add(h.name,"Heaters",1.5+(h.hitRate3||0)*2,{team:h.team,opp:h.opp,detail:`${(h.hitRate3*100).toFixed(0)}% on 3+ 3PM`}));
  return [...board.values()].map(r=>({...r,sourceCount:r.sources.size,sourceList:[...r.sources]})).filter(r=>r.sourceCount>=2).sort((a,b)=>b.sourceCount-a.sourceCount||b.score-a.score).slice(0,5);});
}

function getDraftBoard(){
  return getMemo("draftBoard",()=>{const board=[];const aiMap=new Map();st.aiPicks.forEach(p=>{const key=normalizePlayerName(p.player||p.PLAYER||p.Player||p.PLAYER_NAME);if(key)aiMap.set(key,p)});
  for(const p of st.tonight){const name=p.PLAYER_NAME;if(!name)continue;const logs=getPlayerLogs(name);const most=logs[0]||{};
    const sP=toNum(most.Seas_PTS),sR=toNum(most.Seas_REB),sA=toNum(most.Seas_AST),sSt=toNum(most.Seas_STL),sB=toNum(most.Seas_BLK),sT=toNum(most.Seas_TOV);
    const proj=sP*1+sR*1.2+sA*1.5+sSt*3+sB*3+sT*-1;
    const l5P=toNum(most.L5_PTS),l5R=toNum(most.L5_REB),l5A=toNum(most.L5_AST),l5St=toNum(most.L5_STL),l5B=toNum(most.L5_BLK),l5T=toNum(most.L5_TOV);
    const l5=l5P*1+l5R*1.2+l5A*1.5+l5St*3+l5B*3+l5T*-1;
    const stocks=sSt+sB;const sb=(stocks*3)/(proj||1);const ab=(sA*1.5)/(proj||1);
    const ai=aiMap.get(normalizePlayerName(name));const isSmash=ai&&normalizeConfidence(ai.confidence)==="SMASH";
    const flags=getSampleFlags(name);
    board.push({name,team:p.TEAM_ABBREVIATION||"",opp:p.TONIGHT_OPP||"",projUD:proj.toFixed(1),l5UD:l5.toFixed(1),seasPTS:sP,seasREB:sR,seasAST:sA,stocks:stocks.toFixed(1),stocksBoost:sb,astBoost:ab,gameTotal:toNum(p.GAME_TOTAL),isSmash,gamesPlayed:logs.length,returning:flags.returning,limitedSample:flags.limited});
  }board.sort((a,b)=>parseFloat(b.projUD)-parseFloat(a.projUD));return board;});
}

function getCorrValue(a,b){
  ensureDerived();
  return derived.corrByPair.get([normalizePlayerName(a),normalizePlayerName(b)].sort().join("|"))||0;
}

function getDraftStacks(){
  return getMemo("draftStacks",()=>{
    const board=getDraftBoard();
    const byName=new Map(board.map(p=>[normalizePlayerName(p.name),p]));
    const byTeamGame=new Map();
    const gameRows=(st.tonight||[]).filter(r=>r.PLAYER_NAME);
    for(const row of gameRows){
      const team=row.TEAM_ABBREVIATION||"";
      const opp=row.TONIGHT_OPP||"";
      const gameKey=[team,opp].sort().join("|");
      if(!byTeamGame.has(team))byTeamGame.set(team,[]);
      byTeamGame.get(team).push({...row,__gameKey:gameKey,__ou:toNum(row.GAME_TOTAL)});
    }
    const pairs=[];
    const seen=new Set();
    function addPair(a,b,meta){
      const key=[normalizePlayerName(a.name),normalizePlayerName(b.name)].sort().join("|");
      if(seen.has(key))return;
      seen.add(key);
      const proj=toNum(a.projUD)+toNum(b.projUD);
      const corr=getCorrValue(a.name,b.name);
      const total=Math.max(toNum(meta.gameTotal),toNum(a.gameTotal),toNum(b.gameTotal));
      const score=proj+Math.max(0,total-220)/4+(corr>0.3?corr*10:0)+(meta.gameStack?4:0)+(meta.sameTeam?2:0);
      const tags=[];
      if(total>=230)tags.push("⚡ HIGH TOTAL");
      if(corr>0.3)tags.push("🔗 CORRELATED");
      if(meta.gameStack||meta.sameTeam)tags.push("🎯 STACK TARGET");
      pairs.push({players:[a,b],score,combinedProj:proj.toFixed(1),gameTotal:total||"",corr,tags,sameTeam:!!meta.sameTeam,gameStack:!!meta.gameStack});
    }
    for(const teamRows of byTeamGame.values()){
      const strong=teamRows.filter(r=>byName.has(normalizePlayerName(r.PLAYER_NAME)));
      for(let i=0;i<strong.length;i++){
        for(let j=i+1;j<strong.length;j++){
          const a=byName.get(normalizePlayerName(strong[i].PLAYER_NAME));
          const b=byName.get(normalizePlayerName(strong[j].PLAYER_NAME));
          addPair(a,b,{sameTeam:true,gameTotal:Math.max(toNum(strong[i].GAME_TOTAL),toNum(strong[j].GAME_TOTAL))});
        }
      }
    }
    const rowsByGame=new Map();
    for(const row of gameRows){
      const key=row.__gameKey;
      if(!rowsByGame.has(key))rowsByGame.set(key,[]);
      rowsByGame.get(key).push(row);
    }
    for(const rows of rowsByGame.values()){
      const total=Math.max(...rows.map(r=>toNum(r.GAME_TOTAL)),0);
      if(total<230)continue;
      for(let i=0;i<rows.length;i++){
        for(let j=i+1;j<rows.length;j++){
          const ra=rows[i],rb=rows[j];
          if((ra.TEAM_ABBREVIATION||"")===(rb.TEAM_ABBREVIATION||""))continue;
          const a=byName.get(normalizePlayerName(ra.PLAYER_NAME));
          const b=byName.get(normalizePlayerName(rb.PLAYER_NAME));
          if(a&&b)addPair(a,b,{gameStack:true,gameTotal:total});
        }
      }
    }
    return pairs.sort((a,b)=>b.score-a.score).slice(0,10);
  });
}

function getDraftStackTagMap(){
  return getMemo("draftStackTags",()=>{
    const map=new Map();
    getDraftStacks().forEach(stack=>{
      stack.players.forEach(p=>{
        const key=normalizePlayerName(p.name);
        if(!map.has(key))map.set(key,new Set());
        stack.tags.forEach(tag=>map.get(key).add(tag));
      });
    });
    return map;
  });
}

function entryField(row,keys){for(const k of keys){if(row&&row[k]!==undefined&&row[k]!==null&&String(row[k]).trim()!=='')return row[k]}return ''}

function entryTeam(row){return String(entryField(row,['team_abbr','TEAM_ABBREVIATION','TEAM','team','teamAbbr','TEAM_ABBR'])||'').trim().toUpperCase()}

function getEntryGames(){return getMemo('gameEntry:games',()=>{const byId=new Map();const add=(id,label,teams=[],time='')=>{if(!id)return;if(!byId.has(id))byId.set(id,{id,label:label||teams.join(' vs '),teams,time});else{const g=byId.get(id);if((label||'').includes('@'))g.label=label;if(time&&!g.time)g.time=time}};(st.picks||[]).forEach(p=>{const g=entryGameFromText(p.game||p.GAME||p.matchup||p.MATCHUP);if(g)add(g.id,g.label,g.teams)});entryRosterRows().forEach(r=>add(r.id,`${r.team} vs ${r.opp}`,[r.team,r.opp]));(st.schedule||[]).forEach(r=>{const away=String(entryField(r,['away_team','AWAY_TEAM','away','AWAY','away_abbr','away_team_abbr'])||'').toUpperCase();const home=String(entryField(r,['home_team','HOME_TEAM','home','HOME','home_abbr','home_team_abbr'])||'').toUpperCase();const t=entryField(r,['game_time','GAME_TIME','start_time','START_TIME','time','TIME']);if(away&&home)add(entryPairId(away,home),`${away} @ ${home}`,[away,home],t)});return [...byId.values()].sort((a,b)=>a.label.localeCompare(b.label))})}

function entryLatestPicks(){const d=typeof getLatestPickDate==='function'?getLatestPickDate():((st.latestPickDate||'')||[...new Set((st.picks||[]).map(p=>p.DATE).filter(Boolean))].sort().pop());const rows=(st.picks||[]).filter(p=>!d||normalizeDate(p.DATE||p.date)===d);const maxRun=Math.max(0,...rows.map(p=>toNum(p.RUN_NUMBER||0)));return maxRun?rows.filter(p=>toNum(p.RUN_NUMBER||0)===maxRun):rows}

function entryBestBook(prop,lean){if(!prop)return null;const side=String(lean||'OVER').toUpperCase()==='UNDER'?'UNDER':'OVER';const book=prop[`BEST_${side}_BOOK`];const odds=prop[`BEST_${side}_ODDS`];if(!book||odds==='')return null;const delta=Number(prop[`BEST_${side}_DELTA_PP`]);return {book:String(book),odds,delta:Number.isFinite(delta)?delta:null,isDK:String(book).toLowerCase()==='draftkings'}}

function buildCandidatePool(gameId){const games=getEntryGames();const game=games.find(g=>g.id===gameId);if(!game)return {game:null,candidates:[]};const roster=entryRosterRows().filter(r=>r.id===gameId);const playerNames=new Set(roster.map(r=>normalizePlayerName(r.player)));const candidates=[];const seenAI=new Set();entryLatestPicks().forEach(p=>{const g=entryGameFromText(p.game||p.GAME||p.matchup||p.MATCHUP);let inGame=g&&g.id===gameId;if(!inGame&&playerNames.has(normalizePlayerName(p.player)))inGame=true;if(!inGame)return;const prop=entryFindProp(p.player,p.prop_type,p.line);if(!prop)return;const lean=String(p.lean||'OVER').toUpperCase()==='UNDER'?'UNDER':'OVER';const odds=lean==='OVER'?prop.OVER_ODDS:prop.UNDER_ODDS;if(!odds)return;const key=`${normalizePlayerName(p.player)}|${entryMetric(p.prop_type)}|${lean}`;seenAI.add(key);candidates.push({player:p.player,prop_type:entryMetric(p.prop_type),line:p.line||prop.DK_LINE,lean,odds,ai_tier:normalizeConfidence(p.confidence),source:'AI',prop})});(st.props||[]).forEach(prop=>{if(!playerNames.has(normalizePlayerName(prop.PLAYER_NAME)))return;['OVER','UNDER'].forEach(lean=>{const odds=lean==='OVER'?prop.OVER_ODDS:prop.UNDER_ODDS;if(!odds)return;const key=`${normalizePlayerName(prop.PLAYER_NAME)}|${entryMetric(prop.METRIC)}|${lean}`;if(seenAI.has(key))return;candidates.push({player:prop.PLAYER_NAME,prop_type:entryMetric(prop.METRIC),line:prop.DK_LINE,lean,odds,ai_tier:'LEAN',source:'DK',prop})})});return {game,candidates}}
function scoreCandidate(c){const tier=normalizeConfidence(c.ai_tier||'LEAN');const tierWeight=GAME_ENTRY_TIER_WEIGHTS[tier]||GAME_ENTRY_TIER_WEIGHTS.LEAN;const wlb=entryPerfWLB(c.prop_type);return {...c,ai_tier:tier,tier_weight:tierWeight,wlb,leg_score:tierWeight*wlb}}
function selectTopN(candidates,n){const sorted=candidates.map(scoreCandidate).sort((a,b)=>b.leg_score-a.leg_score);const used=new Set(),perPlayer=new Map(),out=[];for(const c of sorted){const playerKey=normalizePlayerName(c.player),key=`${playerKey}|${entryMetric(c.prop_type)}`;if(used.has(key))continue;if((perPlayer.get(playerKey)||0)>=GAME_ENTRY_MAX_LEGS_PER_PLAYER)continue;used.add(key);perPlayer.set(playerKey,(perPlayer.get(playerKey)||0)+1);out.push(c);if(out.length>=n)break}return out}
function entryAmericanToDecimal(odds){const o=Number(String(odds).replace(/[^0-9+\-.]/g,''));if(!Number.isFinite(o)||o===0)return 1;return o>0?1+o/100:1+100/Math.abs(o)}

function detectDrifts(rows,threshold=0.10){const all=(rows||[]).filter(r=>String(statField(r,'TIME_WINDOW'))==='all_time'&&statBool(r,'MIN_SAMPLE_FLAG'));const recent=(rows||[]).filter(r=>String(statField(r,'TIME_WINDOW'))==='last_30d'&&statBool(r,'MIN_SAMPLE_FLAG'));const map=new Map(all.map(r=>[`${statField(r,'DIMENSION_TYPE')}|${statField(r,'DIMENSION_VALUE')}`,r]));return recent.map(r=>{const key=`${statField(r,'DIMENSION_TYPE')}|${statField(r,'DIMENSION_VALUE')}`;const base=map.get(key);if(!base)return null;const hr30=statNum(r,'HIT_RATE'),hrAll=statNum(base,'HIT_RATE');const delta=hr30-hrAll;if(!Number.isFinite(delta)||Math.abs(delta)<threshold)return null;return{dimension_type:statField(r,'DIMENSION_TYPE'),dimension_value:statField(r,'DIMENSION_VALUE'),hit_rate_last_30d:hr30,hit_rate_all_time:hrAll,delta,n:statNum(r,'N_PICKS_DECISIVE')}}).filter(Boolean).sort((a,b)=>Math.abs(b.delta)-Math.abs(a.delta))}
function renderDriftAlerts(rows){const drifts=detectDrifts(rows);if(!drifts.length)return '';const shown=drifts.slice(0,5);return `<div style="padding:0 16px 8px"><div style="color:#fbbf24;font-size:12px;font-weight:800;margin-bottom:6px">Drift Alerts</div>${shown.map(d=>`<div class="card" style="border-color:#fbbf2444;margin-bottom:6px"><div style="font-size:12px;color:#fbbf24;font-weight:800">⚠️ DRIFT — ${esc(String(d.dimension_value||d.dimension_type))}</div><div style="font-size:11px;color:#d1d5db;margin-top:4px">last 30d ${statPct(d.hit_rate_last_30d)} vs all-time ${statPct(d.hit_rate_all_time)} (${d.delta>0?'+':''}${Math.round(d.delta*100)}pp on n=${Math.round(d.n)})</div></div>`).join('')}${drifts.length>5?`<div style="color:#9ca3af;font-size:10px;padding:2px 4px">... and ${drifts.length-5} more</div>`:''}</div>`}
function renderOverallCard(rows,w){const r=getMetricsForSlice(rows,'overall','',w);if(!r)return `<div class="empty">No overall stats for ${statsWindowLabel(w)}.</div>`;const low=!statBool(r,'MIN_SAMPLE_FLAG');return `<div class="card" style="margin:0 16px 10px;border-color:#eab30844"><div class="card-title">OVERALL — ${statsWindowLabel(w)} ${low?'<span style="font-size:10px;color:#fbbf24">(low sample)</span>':''}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:end"><div><div style="font-size:34px;font-weight:900;color:#eab308">${statPct(statNum(r,'HIT_RATE'))}</div><div style="font-size:11px;color:#9ca3af">Push-adjusted hit rate</div><div style="font-size:12px;color:#d1d5db;margin-top:6px">${Math.round(statNum(r,'N_PICKS_DECISIVE'))} decisive / ${Math.round(statNum(r,'N_PICKS'))} picks</div></div><div style="text-align:right"><div style="font-size:18px;font-weight:800;color:${statNum(r,'ROI_PER_PICK')>=0?'#22c55e':'#ef4444'}">ROI/pick ${statSigned(statNum(r,'ROI_PER_PICK'))}</div><div style="font-size:11px;color:#9ca3af">Flat -115 model</div></div></div></div>`}
function hitBar(rate){const r=Math.max(0,Math.min(1,Number(rate)||0));const w=Math.round(r*100);const good=r>=STATS_BREAK_EVEN;return `<div style="height:7px;background:#26313a;border-radius:999px;overflow:hidden;margin-top:5px"><div style="height:100%;width:${w}%;background:${good?'#22c55e':'#ef4444'}"></div></div><div style="font-size:9px;color:#9ca3af;margin-top:2px">break-even 52.4%</div>`}

function loadAllData(){
  st.loading=true;st.error=null;cache.player=null;cache.sortedLogs=null;resetDerived();render();
  Promise.all([fetchSheet("Tonights_Opponent").catch(()=>null),fetchSheet("Player_Stats").catch(()=>null),fetchSheet("DK_Player_Props").catch(()=>[]),fetchSheet("Home_Away_Splits").catch(()=>[]),fetchSheet("Daily_Picks").catch(()=>[]),fetchSheet("Teammate_Correlations").catch(()=>[]),fetchSheet("Pick_Performance").catch(()=>[]),fetchSheet("Pick_Performance_Snapshots").catch(()=>[])])
  .then(([tonight,stats,props,splits,picks,correlations,pickPerformance,pickPerformanceSnaps])=>{
    if(!tonight||!stats){st.error="Could not load critical sheets.";st.loading=false;render();return}
    // Apply data cleaning (ported from MLB)
    st.tonight=normalizeKeys(cleanRows(tonight));
    st.playerStats=normalizeKeys(cleanRows(stats));
    st.props=normalizeKeys(cleanRows(props||[]));
    st.splits=normalizeKeys(cleanRows(splits||[]));
    st.correlations=normalizeKeys(cleanRows(correlations||[]));
    st.pickPerformance=normalizeKeys(cleanRows(pickPerformance||[]));
    st.pickPerformanceSnaps=normalizeKeys(cleanRows(pickPerformanceSnaps||[]));
    const cleanPicks=normalizeKeys(cleanRows(picks||[])).map(p=>({
      ...p,
      player: cleanName(p.player||p.PLAYER||p.Player||p.PLAYER_NAME),
      prop_type: normalizePropName(p.prop_type||p.PROP_TYPE||p.Prop_Type),
      lean: normalizeLeanText(p.lean||p.LEAN||p.Lean),
      confidence: normalizeConfidence(p.confidence||p.CONFIDENCE||p.Confidence),
      DATE: normalizeDate(p.DATE||p.date||p.Date),
      __pickPlayer: cleanName(p.player||p.PLAYER||p.Player||p.PLAYER_NAME),
      __normDate: normalizeDate(p.DATE||p.date||p.Date)
    }));
    const tonightNames=new Set(st.tonight.map(p=>normalizePlayerName(p.PLAYER_NAME)).filter(Boolean));
    const allDates=[...new Set(cleanPicks.map(p=>p.__normDate).filter(Boolean))].sort();
    let latestDate="";
    for(let i=allDates.length-1;i>=0;i--){
      const d=allDates[i];
      const overlap=cleanPicks.filter(p=>p.__normDate===d).filter(p=>tonightNames.has(normalizePlayerName(p.__pickPlayer))).length;
      if(overlap>0){latestDate=d;break}
    }
	    const datePicks=(latestDate?cleanPicks.filter(p=>p.__normDate===latestDate):[]).filter(p=>tonightNames.has(normalizePlayerName(p.__pickPlayer))).sort((a,b)=>toNum(a.rank)-toNum(b.rank));
	    const seen=new Set();st.aiPicks=datePicks.filter(p=>{const k=normalizePlayerName(p.__pickPlayer);if(!k||seen.has(k))return false;seen.add(k);return true}).map(({__pickPlayer,__normDate,...rest})=>rest);
	    const DASHBOARD_EXPECTS = {
	      Tonights_Opponent: ['PLAYER_NAME', 'TEAM_ABBREVIATION', 'TONIGHT_OPP',
	                          'RETURNING', 'LIMITED_SAMPLE', 'L5_GAMES_PLAYED', 'GAMES_LAST_7D'],
	      Daily_Picks: ['DATE', 'RUN_NUMBER', 'player', 'prop_type', 'line', 'lean', 'confidence', 'rationale', 'HIT'],
	      DK_Player_Props: ['PLAYER_NAME', 'METRIC', 'DK_LINE', 'OVER_ODDS', 'UNDER_ODDS'],
	    };
	    const _schemaSources = {
	      Tonights_Opponent: st.tonight,
	      Daily_Picks: cleanPicks,
	      DK_Player_Props: st.props,
	    };
	    const _schemaIssues = [];
	    for (const [sheet, expectedCols] of Object.entries(DASHBOARD_EXPECTS)) {
	      const rows = _schemaSources[sheet];
	      if (!rows || !rows.length) continue;
	      const actualCols = new Set(Object.keys(rows[0]));
	      const missing = expectedCols.filter(c => !actualCols.has(c));
	      if (missing.length) _schemaIssues.push(`${sheet}: missing [${missing.join(', ')}]`);
	    }
	    if (_schemaIssues.length) {
	      console.warn('⚠️ SCHEMA DRIFT DETECTED:');
	      _schemaIssues.forEach(i => console.warn('  ' + i));
	    } else {
	      console.log('✅ Dashboard schema audit: all expected columns present');
	    }
	    st.dataVersion+=1;
    st.latestPickDate=latestDate;
    st.pickGuard=getPickGuard(latestDate,st.aiPicks.length);
    st.loading=false;st.loadedAt=new Date().toLocaleTimeString();
    // Use robust player finder (ported from MLB)
    if(st.tonight.length>0&&!st.player){
      st.player=firstValidPlayer(st.tonight);
      const p=st.props.find(pr=>normalizePlayerName(pr.PLAYER_NAME)===normalizePlayerName(st.player)&&normalizePropName(pr.METRIC)===normalizePropName(st.metric));
      st.line=p?.DK_LINE||"";
    }
    console.log(`🚀 WNBA Dashboard loaded — player:"${st.player}"`);
    console.log(`   Tonight: ${st.tonight.length}, Stats: ${st.playerStats.length}, Props: ${st.props.length}`);
    console.log(`   Picks: ${st.aiPicks.length}, Splits: ${st.splits.length}, Corr: ${st.correlations.length}`);
    if(st.pickGuard)console.warn(`⚠️ ${st.pickGuard.text}`);
    if(st.tonight.length>0)console.log(`   Row 0 keys:`,Object.keys(st.tonight[0]).slice(0,8));
    if(!st.player)console.error(`❌ NO DEFAULT PLAYER FOUND. Row 0:`,JSON.stringify(st.tonight[0]).slice(0,200));
    st.streaks=getStreaks();render();
  }).catch(err=>{
    console.error("❌ Load failed:",err);
    st.loading=false;st.error="Could not load data. Check Google Sheet sharing settings.";render();
  });
}
loadAllData();
</script>
