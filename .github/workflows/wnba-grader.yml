name: WNBA Grader

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 10 * * *"

jobs:
  run-wnba-grader:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      WNBA_SHEET_ID: 1mv_4oNUP8nX418sUulo-Ect3qSQLL1zGzW3r0QEMD6g
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy pytz gspread google-auth nba_api

      - name: Run WNBA grader
        run: python WNBAGrader5-17.py
