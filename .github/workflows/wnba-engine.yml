name: WNBA Engine

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"
    - cron: "0 14 * * *"
    - cron: "0 18 * * *"
    - cron: "0 20 * * *"
    - cron: "0 22 * * *"

jobs:
  run-wnba-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      WNBA_SHEET_ID: 1mv_4oNUP8nX418sUulo-Ect3qSQLL1zGzW3r0QEMD6g
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy requests pytz gspread google-auth google-genai nba_api

      - name: Run WNBA engine
        run: python WNBAEnginev5-17.py
